<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VLSFO.XYZ</title>
    <style>
        :root {
            --primary-color: #003366;
            --bg-color: #f4f7f6;
            --error-bg: #fdf7f7;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border 0.2s;
            outline: none;
            background: #fafafa;
        }
        input:focus {
            border-color: var(--primary-color);
            background: white;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            border: none;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login {
            background: var(--primary-color);
            color: white;
        }
        .btn-login:hover:not(:disabled) {
            background: #002244;
        }
        .btn-signup {
            background: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        .btn-signup:hover:not(:disabled) {
            background: #f0f5ff;
        }
        .btn-google {
            background: white;
            border: 1px solid #ddd;
            color: #333;
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            pointer-events: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0;
            color: #aaa;
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        #errorBox {
            color: #c0392b;
            font-size: 13px;
            margin-top: 14px;
            padding: 10px;
            border-radius: 8px;
            background: var(--error-bg);
            display: none;
            text-align: left;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 Access VLSFO.XYZ</h2>

    <input type="email" id="email" placeholder="Email Address" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">

    <button class="btn btn-login" id="loginBtn">Sign In</button>
    <button class="btn btn-signup" id="signupBtn">Create Account</button>

    <div class="divider">or continue with</div>

    <button class="btn btn-google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Sign in with Google
    </button>

    <div id="errorBox"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getAuth,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    GoogleAuthProvider,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  // ==================== الإعدادات ====================
  const firebaseConfig = {
    apiKey: "AIzaSyBXGYK1FSd25Ru2aoXFt7Ah2ELnrof4Shs",
    authDomain: "vlsfo-3e338.firebaseapp.com",
    projectId: "vlsfo-3e338",
    storageBucket: "vlsfo-3e338.firebasestorage.app",
    messagingSenderId: "45756829403",
    appId: "1:45756829403:web:e040cbf1c62f2ca8e906fe",
    measurementId: "G-6VPFMFFVFH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // ==================== دوال مساعدة ====================
  function showError(message) {
    const box = document.getElementById('errorBox');
    box.textContent = `❌ ${message}`;
    box.style.display = 'block';
  }

  function hideError() {
    const box = document.getElementById('errorBox');
    box.style.display = 'none';
  }

  // تعطيل/تفعيل الأزرار أثناء الطلب
  function setButtonsDisabled(disabled) {
    document.getElementById('loginBtn').disabled = disabled;
    document.getElementById('signupBtn').disabled = disabled;
    document.getElementById('googleBtn').disabled = disabled;
  }

  // حفظ الحالة الأصلية للنص
  const originalTexts = {};
  function setButtonLoading(button, isLoading, loadingText = "Please wait...") {
    if (!originalTexts[button.id]) {
      originalTexts[button.id] = button.textContent.trim();
    }
    button.textContent = isLoading ? loadingText : originalTexts[button.id];
  }

  function isMobileDevice() {
    return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
  }

  // الانتقال بعد نجاح الدخول
  function goToDashboard() {
    window.location.href = "index.html";
  }

  // ==================== التعامل مع نتائج إعادة التوجيه (redirect) ====================
  // يفحص عند تحميل الصفحة إذا كان هناك نتيجة redirect (قادم من Google mobile)
  getRedirectResult(auth)
    .then((result) => {
      if (result) {
        // نجح الدخول عبر redirect
        goToDashboard();
      }
    })
    .catch((error) => {
      showError(error.message);
    });

  // ==================== تسجيل الدخول عبر Google ====================
  document.getElementById('googleBtn').addEventListener('click', async () => {
    hideError();
    const googleBtn = document.getElementById('googleBtn');
    setButtonsDisabled(true);
    setButtonLoading(googleBtn, true, "Connecting...");

    try {
      if (isMobileDevice()) {
        // على الجوال: نستخدم redirect لأنه أفضل من popup
        await signInWithRedirect(auth, googleProvider);
        // سيتم إعادة تحميل الصفحة بعد redirect، وسيلتقط getRedirectResult العملية
      } else {
        // سطح المكتب: popup
        await signInWithPopup(auth, googleProvider);
        goToDashboard();
      }
    } catch (error) {
      // إذا فشل popup (مثل popup-closed-by-user) نحاول redirect كخطة بديلة
      if (error.code === 'auth/popup-closed-by-user') {
        showError("You closed the login popup. Please try again.");
      } else if (error.code === 'auth/cancelled-popup-request' || error.code === 'auth/popup-blocked') {
        // ربما المتصفح منع النافذة، ننتقل للـ redirect
        try {
          await signInWithRedirect(auth, googleProvider);
        } catch (redirectError) {
          showError(redirectError.message);
        }
      } else {
        showError(error.message);
      }
    } finally {
      setButtonsDisabled(false);
      setButtonLoading(googleBtn, false);
    }
  });

  // ==================== تسجيل الدخول بالبريد وكلمة المرور ====================
  document.getElementById('loginBtn').addEventListener('click', async () => {
    hideError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError("Please enter both email and password.");
      return;
    }

    const loginBtn = document.getElementById('loginBtn');
    setButtonsDisabled(true);
    setButtonLoading(loginBtn, true, "Signing in...");

    try {
      await signInWithEmailAndPassword(auth, email, password);
      goToDashboard();
    } catch (error) {
      // رسالة خطأ واضحة للمستخدم
      let friendlyMsg = "Login failed. Please check your credentials.";
      if (error.code === 'auth/user-not-found') {
        friendlyMsg = "No account found with this email.";
      } else if (error.code === 'auth/wrong-password') {
        friendlyMsg = "Incorrect password. Please try again.";
      } else if (error.code === 'auth/invalid-email') {
        friendlyMsg = "Invalid email format.";
      } else if (error.code === 'auth/too-many-requests') {
        friendlyMsg = "Too many attempts. Please wait and try again.";
      }
      showError(friendlyMsg);
    } finally {
      setButtonsDisabled(false);
      setButtonLoading(loginBtn, false);
    }
  });

  // ==================== إنشاء حساب جديد ====================
  document.getElementById('signupBtn').addEventListener('click', async () => {
    hideError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError("Please fill all fields to create an account.");
      return;
    }

    if (password.length < 6) {
      showError("Password must be at least 6 characters long.");
      return;
    }

    const signupBtn = document.getElementById('signupBtn');
    setButtonsDisabled(true);
    setButtonLoading(signupBtn, true, "Creating account...");

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      // الحساب أنشئ بنجاح، توجيه مباشر (يمكن إضافة تنبيه)
      goToDashboard();
    } catch (error) {
      let msg = "Account creation failed.";
      if (error.code === 'auth/email-already-in-use') {
        msg = "An account with this email already exists. Please login instead.";
      } else if (error.code === 'auth/invalid-email') {
        msg = "Invalid email address.";
      } else if (error.code === 'auth/weak-password') {
        msg = "Password is too weak (minimum 6 characters).";
      }
      showError(msg);
    } finally {
      setButtonsDisabled(false);
      setButtonLoading(signupBtn, false);
    }
  });

  // إخفاء الخطأ عند الكتابة مجدداً
  document.getElementById('email').addEventListener('input', hideError);
  document.getElementById('password').addEventListener('input', hideError);
</script>

</body>
</html>
