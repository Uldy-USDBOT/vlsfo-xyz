<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal | VLSFO.XYZ</title>
    <style>
        :root { 
            --primary-color: #003366; 
            --secondary-color: #4285F4; 
            --bg-color: #f4f7f6;
            --error-color: #d9534f;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
        }
        h2 { color: var(--primary-color); margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        .btn { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px; 
            margin-bottom: 10px;
            border: none;
            transition: 0.3s;
        }
        .btn-login { background: var(--primary-color); color: white; }
        .btn-signup { background: white; color: var(--primary-color); border: 1px solid var(--primary-color); }
        .btn-google { 
            background: white; 
            border: 1px solid #ddd; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #555;
        }
        .btn-google img { width: 18px; margin-right: 10px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .divider { margin: 20px 0; color: #aaa; font-size: 12px; text-transform: uppercase; }
        .error-msg { 
            color: var(--error-color); 
            font-size: 13px; 
            margin-top: 10px; 
            display: none; 
            background: #fdf7f7; 
            padding: 10px; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>VLSFO.XYZ Access</h2>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Email Address" required>
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
    </div>

    <button class="btn btn-login" onclick="loginWithEmail()">Login</button>
    
    <button class="btn btn-signup" onclick="signUpWithEmail()">Create New Account</button>

    <div class="divider">OR</div>

    <button class="btn btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Sign in with Google
    </button>

    <p id="error" class="error-msg"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  // Your Firebase Configuration (vlsfo-3e338)
  const firebaseConfig = {
    apiKey: "AIzaSyBXGYK1FSd25Ru2aoXFt7Ah2ELnrof4Shs",
    authDomain: "vlsfo-3e338.firebaseapp.com",
    projectId: "vlsfo-3e338",
    storageBucket: "vlsfo-3e338.firebasestorage.app",
    messagingSenderId: "45756829403",
    appId: "1:45756829403:web:e040cbf1c62f2ca8e906fe",
    measurementId: "G-6VPFMFFVFH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // Google Login Function
  window.loginWithGoogle = () => {
    signInWithPopup(auth, googleProvider)
      .then(() => window.location.href = "index.html")
      .catch((error) => showError("Google Login Error: " + error.message));
  };

  // Email Login Function
  window.loginWithEmail = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email || !password) return showError("Please enter email and password");

    signInWithEmailAndPassword(auth, email, password)
      .then(() => window.location.href = "index.html")
      .catch((error) => showError("Login failed: Check your credentials"));
  };

  // Sign Up Function
  window.signUpWithEmail = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if(!email || password.length < 6) {
        showError("Password must be at least 6 characters");
        return;
    }

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("Account created successfully!");
        window.location.href = "index.html"; 
      })
      .catch((error) => {
        if(error.code === 'auth/email-already-in-use') {
            showError("Email already registered. Try logging in.");
        } else {
            showError(error.message);
        }
      });
  };

  function showError(msg) {
    const errorEl = document.getElementById('error');
    errorEl.innerText = msg;
    errorEl.style.display = 'block';
  }
</script>

</body>
</html>
