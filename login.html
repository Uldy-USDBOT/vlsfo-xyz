<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VLSFO.XYZ</title>
    <style>
        :root {
            --primary-color: #003366;
            --bg-color: #f4f7f6;
            --error-bg: #fdf7f7;
            --success-color: #27ae60;
            --success-bg: #f0fff4;
            --text-muted: #666;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        
        /* Site Branding & Description */
        .brand-header {
            margin-bottom: 2rem;
        }
        h2 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .site-description {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border 0.2s;
            outline: none;
            background: #fafafa;
        }
        input:focus {
            border-color: var(--primary-color);
            background: white;
        }
        
        .forgot-link-container {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .forgot-link {
            font-size: 13px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            border: none;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login {
            background: var(--primary-color);
            color: white;
        }
        .btn-login:hover:not(:disabled) {
            background: #002244;
        }
        .btn-signup {
            background: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        .btn-signup:hover:not(:disabled) {
            background: #f0f5ff;
        }
        .btn-google {
            background: white;
            border: 1px solid #ddd;
            color: #333;
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            pointer-events: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0;
            color: #aaa;
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        
        #messageBox {
            font-size: 13px;
            margin-top: 14px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            text-align: left;
            word-break: break-word;
        }
        .error-msg {
            color: #c0392b;
            background: var(--error-bg);
        }
        .success-msg {
            color: var(--success-color);
            background: var(--success-bg);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-header">
        <h2>🔐 VLSFO.XYZ</h2>
        <p class="site-description">
            The world's leading specialized platform for <strong>Very Low Sulfur Fuel Oil</strong> data, global supply tracking, and maritime fuel solutions.
        </p>
    </div>

    <input type="email" id="email" placeholder="Email Address" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">

    <div class="forgot-link-container">
        <a href="#" class="forgot-link" id="forgotPasswordBtn">Forgot Password?</a>
    </div>

    <button class="btn btn-login" id="loginBtn">Sign In</button>
    <button class="btn btn-signup" id="signupBtn">Create Account</button>

    <div class="divider">or continue with</div>

    <button class="btn btn-google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Sign in with Google
    </button>

    <div id="messageBox"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getAuth,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    GoogleAuthProvider,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBXGYK1FSd25Ru2aoXFt7Ah2ELnrof4Shs",
    authDomain: "vlsfo-3e338.firebaseapp.com",
    projectId: "vlsfo-3e338",
    storageBucket: "vlsfo-3e338.firebasestorage.app",
    messagingSenderId: "45756829403",
    appId: "1:45756829403:web:e040cbf1c62f2ca8e906fe",
    measurementId: "G-6VPFMFFVFH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  function showMessage(message, type = 'error') {
    const box = document.getElementById('messageBox');
    box.textContent = type === 'error' ? `❌ ${message}` : `✅ ${message}`;
    box.className = type === 'error' ? 'error-msg' : 'success-msg';
    box.style.display = 'block';
  }

  function hideMessage() {
    const box = document.getElementById('messageBox');
    box.style.display = 'none';
  }

  function setButtonsDisabled(disabled) {
    document.getElementById('loginBtn').disabled = disabled;
    document.getElementById('signupBtn').disabled = disabled;
    document.getElementById('googleBtn').disabled = disabled;
    document.getElementById('forgotPasswordBtn').style.pointerEvents = disabled ? 'none' : 'auto';
  }

  const originalTexts = {};
  function setButtonLoading(button, isLoading, loadingText = "Processing...") {
    if (!originalTexts[button.id]) {
      originalTexts[button.id] = button.textContent.trim();
    }
    button.textContent = isLoading ? loadingText : originalTexts[button.id];
  }

  function isMobileDevice() {
    return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
  }

  function goToDashboard() {
    window.location.href = "index.html";
  }

  getRedirectResult(auth)
    .then((result) => { if (result) goToDashboard(); })
    .catch((error) => showMessage(error.message));

  document.getElementById('forgotPasswordBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    hideMessage();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showMessage("Please enter your email to reset password.", "error");
      return;
    }
    setButtonsDisabled(true);
    try {
      await sendPasswordResetEmail(auth, email);
      showMessage("Password reset link sent! Check your inbox.", "success");
    } catch (error) {
      showMessage("Error: " + error.message, "error");
    } finally {
      setButtonsDisabled(false);
    }
  });

  document.getElementById('googleBtn').addEventListener('click', async () => {
    hideMessage();
    const googleBtn = document.getElementById('googleBtn');
    setButtonsDisabled(true);
    setButtonLoading(googleBtn, true, "Redirecting...");
    try {
      if (isMobileDevice()) await signInWithRedirect(auth, googleProvider);
      else { await signInWithPopup(auth, googleProvider); goToDashboard(); }
    } catch (error) { showMessage(error.message); }
    finally { setButtonsDisabled(false); setButtonLoading(googleBtn, false); }
  });

  document.getElementById('loginBtn').addEventListener('click', async () => {
    hideMessage();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showMessage("Please enter email and password."); return; }
    const loginBtn = document.getElementById('loginBtn');
    setButtonsDisabled(true);
    setButtonLoading(loginBtn, true, "Signing in...");
    try { await signInWithEmailAndPassword(auth, email, password); goToDashboard(); }
    catch (error) { showMessage("Login failed. Check your credentials."); }
    finally { setButtonsDisabled(false); setButtonLoading(loginBtn, false); }
  });

  document.getElementById('signupBtn').addEventListener('click', async () => {
    hideMessage();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showMessage("Please fill all fields."); return; }
    const signupBtn = document.getElementById('signupBtn');
    setButtonsDisabled(true);
    setButtonLoading(signupBtn, true, "Creating Account...");
    try { await createUserWithEmailAndPassword(auth, email, password); goToDashboard(); }
    catch (error) { showMessage("Signup failed: " + error.message); }
    finally { setButtonsDisabled(false); setButtonLoading(signupBtn, false); }
  });

  document.getElementById('email').addEventListener('input', hideMessage);
  document.getElementById('password').addEventListener('input', hideMessage);
</script>

</body>
</html>
