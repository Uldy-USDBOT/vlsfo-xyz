<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLSFO Hub Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;display:flex;background:#f4f7fb;}
.sidebar{width:230px;background:#0b1d35;color:#fff;height:100vh;padding:20px;}
.sidebar div{padding:12px;cursor:pointer;border-radius:6px;}
.sidebar div:hover{background:#1d3557;}
.main{flex:1;padding:20px;}
.page{display:none;}
.active{display:block;}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px 0;}
input,button{width:100%;padding:10px;margin:5px 0;}
button{background:#0b1d35;color:#fff;border:none;}
#map{height:500px;border-radius:10px;}
</style>
</head>

<body>

<div class="sidebar">
<h2>VLSFO Hub</h2>
<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('calculator')">Fuel Calculator</div>
<div onclick="showPage('ports')">Ports Map</div>
</div>

<div class="main">

<!-- Dashboard -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>

<div class="card">Live VLSFO Price: <span id="price"></span></div>
<canvas id="chart"></canvas>

</div>

<!-- Calculator -->
<div id="calculator" class="page">
<h2>Fuel Calculator</h2>

<input type="number" id="power" placeholder="Engine Power (kW)">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="rate" value="180" placeholder="g/kWh">

<button onclick="calcFuel()">Calculate</button>

<h3 id="result"></h3>
</div>

<!-- Ports -->
<div id="ports" class="page">
<h2>Smart Ports Map</h2>

<input type="text" id="search" placeholder="Search port..." onkeyup="searchPort()">
<button onclick="findNearest()">Find Nearest Port</button>

<div id="map"></div>
<h3 id="nearest"></h3>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Navigation
function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// Fake Live Price
let price = (570 + Math.random()*30).toFixed(2);
document.getElementById("price").innerText = "$"+price;

// Chart
new Chart(document.getElementById("chart"), {
type:'line',
data:{labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{data:[560,575,570,590,price],borderWidth:2}]}
});

// Calculator
function calcFuel(){
let p=power.value,h=hours.value,r=rate.value;
let c=(p*h*r)/1000000;
result.innerText="Consumption: "+c.toFixed(2)+" MT";
}

// Map
var map=L.map('map').setView([25,10],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Ports
var ports=[
{name:"Singapore",lat:1.29,lng:103.85,price:585},
{name:"Rotterdam",lat:51.92,lng:4.48,price:579},
{name:"Fujairah",lat:25.13,lng:56.33,price:577},
{name:"Houston",lat:29.73,lng:-95.27,price:583}
];

var markers=[];

function renderPorts(list){
markers.forEach(m=>map.removeLayer(m));
markers=[];
list.forEach(p=>{
let color=p.price<580?"green":"red";
let marker=L.circleMarker([p.lat,p.lng],{
radius:8,color:color
}).addTo(map)
.bindPopup(`<b>${p.name}</b><br>Price: $${p.price}`);
markers.push(marker);
});
}

renderPorts(ports);

// Search
function searchPort(){
let val=search.value.toLowerCase();
let filtered=ports.filter(p=>p.name.toLowerCase().includes(val));
renderPorts(filtered);
}

// Nearest Port
function findNearest(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
let userLat=pos.coords.latitude;
let userLng=pos.coords.longitude;

let nearestPort=null;
let minDist=99999;

ports.forEach(p=>{
let d=Math.sqrt(
Math.pow(userLat-p.lat,2)+Math.pow(userLng-p.lng,2)
);
if(d<minDist){minDist=d;nearestPort=p;}
});

nearest.innerText="Nearest Port: "+nearestPort.name+" ($"+nearestPort.price+")";

map.setView([nearestPort.lat,nearestPort.lng],5);

});
}
}

</script>

</body>
</html>
