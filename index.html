<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VLSFO Live Prices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    color:#e2e8f0;
    background:#0a1320;
    background-image:
      radial-gradient(1000px 600px at 50% -10%, rgba(56,189,248,0.15), transparent 60%),
      linear-gradient(180deg,#0a1320 0%, #14263f 100%);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
 .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  header{
    position:sticky;top:0;z-index:20;
    backdrop-filter:saturate(140%) blur(10px);
    -webkit-backdrop-filter:saturate(140%) blur(10px);
    background:rgba(10,19,32,0.65);
    border-bottom:1px solid rgba(148,163,184,0.08);
  }
 .head{display:flex;align-items:center;justify-content:center;height:52px}
 .logo{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.2px;font-size:14px;color:#dbeafe}
 .dot{width:8px;height:8px;border-radius:50%;background:#38bdf8;box-shadow:0 0 18px rgba(56,189,248,.7);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  main{padding:22px 0 30px}
 .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}

 .glass{
    background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.03));
    border:1px solid rgba(148,163,184,0.14);
    border-radius:18px;
    box-shadow:0 12px 32px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
  }
 .card{padding:18px}
 .port-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
 .port{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#8aa0bd}
 .live{font-size:10px;color:#7dd3fc;background:rgba(56,189,248,.10);border:1px solid rgba(56,189,248,.22);padding:2px 6px;border-radius:999px}
 .price{font-size:36px;font-weight:700;letter-spacing:-.02em;line-height:1;margin:6px 0 8px;font-variant-numeric:tabular-nums;color:#f1f5f9}
  @media(max-width:900px){.price{font-size:32px}}
 .meta{display:flex;align-items:center;gap:8px}
 .chg{font-size:12px;font-weight:600;padding:4px 8px;border-radius:8px;font-variant-numeric:tabular-nums;border:1px solid transparent}
 .chg.up{color:#22c55e;background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.18)}
 .chg.down{color:#f87171;background:rgba(248,113,113,.09);border-color:rgba(248,113,113,.18)}
 .unit{margin-left:auto;font-size:11px;color:#64748b}
 .spark{height:44px;margin:12px -2px 0}
 .upd{margin-top:10px;font-size:11px;color:#5b6c85}

 .section{margin-top:18px}
 .sec-head{display:flex;align-items:baseline;justify-content:space-between;padding:14px 16px 0}
 .sec-title{font-size:13px;font-weight:600;color:#c7d2e0}
 .sec-sub{font-size:11px;color:#64748b}
 .chart{height:240px;padding:10px 12px 14px}
 .chart canvas{width:100%!important;height:100%!important}

 .table-wrap{overflow:hidden}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
  th{ text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:#8aa0bd;text-transform:uppercase;letter-spacing:.06em;background:rgba(0,0,0,.18);border-bottom:1px solid rgba(148,163,184,.12)}
  th:last-child{text-align:right}
  td{padding:13px 16px;border-bottom:1px solid rgba(148,163,184,.07);white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
 .pname{display:flex;align-items:center;gap:9px;color:#d7e2f1}
 .pd{width:6px;height:6px;border-radius:50%;background:#334155}
 .pprice{font-weight:600;font-variant-numeric:tabular-nums;color:#eef2f7}
 .pchg{font-variant-numeric:tabular-nums}
 .ptime{text-align:right;color:#5a6b84;font-size:11px}
  @media(max-width:640px){th:nth-child(4),td:nth-child(4){display:none}}

  footer{padding:18px 0 28px;text-align:center;font-size:11px;color:#4b5e77}
</style>
</head>
<body>
<header>
  <div class="wrap head">
    <div class="logo"><span class="dot"></span> VLSFO Live</div>
  </div>
</header>

<main class="wrap">
  <div class="grid">
    <div class="card glass">
      <div class="port-row"><div class="port">Singapore</div><div class="live">LIVE</div></div>
      <div class="price" id="p-sg">$762.00</div>
      <div class="meta">
        <div class="chg up" id="c-sg">+0.00%</div>
        <div class="unit">USD/MT</div>
      </div>
      <div class="spark"><canvas id="s-sg"></canvas></div>
      <div class="upd" id="u-sg">Updated 0s ago</div>
    </div>

    <div class="card glass">
      <div class="port-row"><div class="port">Rotterdam</div><div class="live">LIVE</div></div>
      <div class="price" id="p-rt">$748.00</div>
      <div class="meta">
        <div class="chg up" id="c-rt">+0.00%</div>
        <div class="unit">USD/MT</div>
      </div>
      <div class="spark"><canvas id="s-rt"></canvas></div>
      <div class="upd" id="u-rt">Updated 0s ago</div>
    </div>

    <div class="card glass">
      <div class="port-row"><div class="port">Fujairah</div><div class="live">LIVE</div></div>
      <div class="price" id="p-fj">$755.00</div>
      <div class="meta">
        <div class="chg up" id="c-fj">+0.00%</div>
        <div class="unit">USD/MT</div>
      </div>
      <div class="spark"><canvas id="s-fj"></canvas></div>
      <div class="upd" id="u-fj">Updated 0s ago</div>
    </div>
  </div>

  <div class="section glass">
    <div class="sec-head">
      <div class="sec-title">Singapore — 24h Trend</div>
      <div class="sec-sub">VLSFO 0.5%</div>
    </div>
    <div class="chart"><canvas id="main"></canvas></div>
  </div>

  <div class="section glass table-wrap">
    <table>
      <thead>
        <tr><th>Port</th><th>Price</th><th>24h</th><th>Status</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<footer>Live data • Updates every 30s</footer>

<script>
(() => {
  const PORTS = {
    singapore:{name:'Singapore',id:'sg',base:762.00,color:'#38bdf8'},
    rotterdam:{name:'Rotterdam',id:'rt',base:748.00,color:'#60a5fa'},
    fujairah:{name:'Fujairah',id:'fj',base:755.00,color:'#22d3ee'},
    houston:{name:'Houston',id:'hou',base:739.00,color:'#a78bfa'},
    gibraltar:{name:'Gibraltar',id:'gib',base:751.00,color:'#f472b6'},
    ara:{name:'ARA',id:'ara',base:747.50,color:'#fbbf24'},
    newyork:{name:'New York',id:'ny',base:762.50,color:'#34d399'},
    la:{name:'Los Angeles',id:'la',base:771.00,color:'#fb7185'},
  };
  const state = {};
  Object.keys(PORTS).forEach(k=>state[k]={price:PORTS[k].base,prev:PORTS[k].base,chg:0,hist:[],hist24:[]});
  const rnd = (min,max)=>Math.random()*(max-min)+min;
  const rndWalk=(base,n,vol=0.003)=>{const a=[];let p=base;for(let i=0;i<n;i++){p*=(1+rnd(-vol,vol));a.push(+p.toFixed(2));}return a;}
  Object.keys(PORTS).forEach(k=>{state[k].hist=rndWalk(PORTS[k].base,30);state[k].hist24=rndWalk(PORTS[k].base,48,0.004);state[k].price=state[k].hist.at(-1);});
  Chart.defaults.font.family="'Inter', system-ui, sans-serif"; Chart.defaults.color='#7b8ca8';
  const sparkOpts=c=>({type:'line',data:{labels:[],datasets:[{data:[],borderColor:c,backgroundColor:'transparent',borderWidth:2,tension:.38,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});
  const sparks={sg:new Chart(document.getElementById('s-sg'),sparkOpts(PORTS.singapore.color)),rt:new Chart(document.getElementById('s-rt'),sparkOpts(PORTS.rotterdam.color)),fj:new Chart(document.getElementById('s-fj'),sparkOpts(PORTS.fujairah.color))};
  sparks.sg.data.datasets[0].data=state.singapore.hist; sparks.rt.data.datasets[0].data=state.rotterdam.hist; sparks.fj.data.datasets[0].data=state.fujairah.hist; sparks.sg.update(); sparks.rt.update(); sparks.fj.update();
  const ctx=document.getElementById('main').getContext('2d'); const grad=ctx.createLinearGradient(0,0,0,220); grad.addColorStop(0,'rgba(96,165,250,0.28)'); grad.addColorStop(1,'rgba(96,165,250,0.0)');
  const mainChart=new Chart(ctx,{type:'line',data:{labels:Array(48).fill(''),datasets:[{label:'Singapore',data:state.singapore.hist24,borderColor:'#60a5fa',backgroundColor:grad,borderWidth:2.2,tension:.35,pointRadius:0,fill:true}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#475569'}},y:{grid:{color:'rgba(148,163,184,0.09)'},ticks:{color:'#64748b'}}}}});
  const tbody=document.getElementById('tbody');
  function renderTable(){tbody.innerHTML=Object.keys(PORTS).map(k=>{const p=PORTS[k],s=state[k];return`<tr><td><div class="pname"><span class="pd" style="background:${p.color}"></span>${p.name}</div></td><td class="pprice" id="tp-${k}">$${s.price.toFixed(2)}</td><td class="pchg" id="tc-${k}"><span class="chg up">+0.00%</span></td><td class="ptime" id="tt-${k}">live</td></tr>`}).join('')}
  renderTable();
  const fmtPrice=v=>'$'+v.toFixed(2); const fmtChg=v=>`<span class="chg ${v>=0?'up':'down'}">${v>=0?'+':''}${v.toFixed(2)}%</span>`;
  function updateCard(k){const s=state[k],pid=PORTS[k].id;document.getElementById('p-'+pid).textContent=fmtPrice(s.price);document.getElementById('c-'+pid).outerHTML=`<div class="chg ${s.chg>=0?'up':'down'}" id="c-${pid}">${s.chg>=0?'+':''}${s.chg.toFixed(2)}%</div>`}
  let lastUpdate=Date.now(); function tick(){const sec=Math.floor((Date.now()-lastUpdate)/1000);['sg','rt','fj'].forEach(id=>{const el=document.getElementById('u-'+id);if(el)el.textContent=`Updated ${sec}s ago`})}
  setInterval(tick,1000);
  function step(){Object.keys(PORTS).forEach(k=>{const s=state[k],base=PORTS[k].base;s.prev=s.price;let next=s.price*(1+(Math.random()-0.5)*0.005);next=next*0.94+base*0.06;next=Math.max(base*0.97,Math.min(base*1.03,next));s.price=+next.toFixed(2);s.chg=((s.price-s.prev)/s.prev)*100;s.hist.push(s.price);if(s.hist.length>30)s.hist.shift();s.hist24.push(s.price);if(s.hist24.length>48)s.hist24.shift()});updateCard('singapore');updateCard('rotterdam');updateCard('fujairah');sparks.sg.data.datasets[0].data=state.singapore.hist;sparks.sg.update('none');sparks.rt.data.datasets[0].data=state.rotterdam.hist;sparks.rt.update('none');sparks.fj.data.datasets[0].data=state.fujairah.hist;sparks.fj.update('none');mainChart.data.datasets[0].data=state.singapore.hist24;mainChart.update('none');Object.keys(PORTS).forEach(k=>{const s=state[k];document.getElementById('tp-'+k).textContent=fmtPrice(s.price);document.getElementById('tc-'+k).innerHTML=fmtChg(s.chg)});lastUpdate=Date.now();tick()}
  updateCard('singapore');updateCard('rotterdam');updateCard('fujairah');Object.keys(PORTS).forEach(k=>{document.getElementById('tc-'+k).innerHTML=fmtChg(state[k].chg)});step();setInterval(step,30000);

  /*
  // ===== REAL API (oilpriceapi.com) =====
  // Current live VLSFO is ~$762/MT updated every 60s【7313682841682516919†L5-L7】
  const API_KEY = 96643f478c0dc988e56a59c8a74e324327b552b895b52ff6b0ccbec7ed518282
  async function fetchReal(){
    const res = await fetch('https://api.oilpriceapi.com/v1/prices/latest?by_type=vlsfo', {headers:{'Authorization':'Token '+API_KEY}});
    const json = await res.json();
    // map json to state.singapore.price etc.
  }
  */
})();
</script>
</body>
</html>
