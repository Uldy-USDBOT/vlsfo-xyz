<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vlsfo.com – Claude AI Chatbot Widget</title>

  <style>
    /* ===== CHATBOT WIDGET STYLES ===== */
    #chat-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #1D9E75;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      transition: transform 0.2s, background 0.2s;
      z-index: 9999;
    }
    #chat-fab:hover { transform: scale(1.08); background: #085041; }
    #chat-fab svg { width: 28px; height: 28px; fill: #fff; }

    #chat-window {
      position: fixed;
      bottom: 100px;
      right: 28px;
      width: 360px;
      height: 500px;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #e0e0e0;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.92) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), opacity 0.22s;
      z-index: 9998;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #chat-window.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    /* Header */
    #chat-header {
      background: #1D9E75;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #chat-header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    #chat-header-info { flex: 1; }
    #chat-header-info p { color: #fff; font-size: 14px; font-weight: 600; margin: 0; line-height: 1.3; }
    #chat-header-info span { color: rgba(255,255,255,0.78); font-size: 12px; }
    #chat-close {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.85);
      font-size: 22px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    #chat-close:hover { color: #fff; }

    /* Messages */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg { display: flex; gap: 8px; animation: fadeUp 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #E1F5EE;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 14px;
    }

    .msg-bubble {
      max-width: 80%;
      padding: 9px 13px;
      font-size: 13.5px;
      line-height: 1.55;
    }
    .msg.bot .msg-bubble {
      background: #f2f2f2;
      color: #222;
      border-radius: 4px 16px 16px 16px;
    }
    .msg.user .msg-bubble {
      background: #1D9E75;
      color: #fff;
      border-radius: 16px 4px 16px 16px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 13px;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
      40%          { transform: scale(1);   opacity: 1;   }
    }

    /* Footer input */
    #chat-footer {
      border-top: 1px solid #eee;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13.5px;
      font-family: inherit;
      background: #f9f9f9;
      color: #222;
      resize: none;
      max-height: 90px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }
    #chat-input:focus { border-color: #1D9E75; background: #fff; }
    #chat-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1D9E75;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #chat-send:hover { background: #085041; }
    #chat-send:active { transform: scale(0.92); }
    #chat-send:disabled { background: #aaa; cursor: default; }
    #chat-send svg { width: 16px; height: 16px; fill: #fff; }

    /* Mobile responsive */
    @media (max-width: 420px) {
      #chat-window { width: calc(100vw - 24px); right: 12px; bottom: 90px; }
      #chat-fab { right: 16px; bottom: 16px; }
    }
  </style>
</head>
<body>

  <!-- ✅ STEP 1: Paste your website content here -->
  <!-- Your existing website HTML goes above this comment -->


  <!-- ===== CLAUDE AI CHATBOT WIDGET ===== -->

  <!-- Floating Button -->
  <button id="chat-fab" aria-label="Open chat assistant">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
  </button>

  <!-- Chat Window -->
  <div id="chat-window" role="dialog" aria-label="Chat assistant">
    <div id="chat-header">
      <div id="chat-header-avatar">🤖</div>
      <div id="chat-header-info">
        <p>vlsfo.com Assistant</p>
        <span>Powered by Claude AI · Online</span>
      </div>
      <button id="chat-close" aria-label="Close chat">✕</button>
    </div>

    <div id="chat-messages">
      <div class="msg bot">
        <div class="bot-avatar">🤖</div>
        <div class="msg-bubble">Hello! Welcome to vlsfo.com 👋<br>How can I help you today?</div>
      </div>
    </div>

    <div id="chat-footer">
      <textarea id="chat-input" placeholder="Type your message..." rows="1"></textarea>
      <button id="chat-send" aria-label="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ====================================================
    // ✅ STEP 2: Replace with your Anthropic API Key
    //    Get it from: https://console.anthropic.com
    // ====================================================
    const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE';

    // ====================================================
    // ✅ STEP 3: Customize the assistant's behavior
    // ====================================================
    const SYSTEM_PROMPT = `You are a helpful and professional assistant for the website vlsfo.com. 
Your job is to assist visitors by answering their questions in a friendly and concise manner. 
Always respond in English regardless of the language the visitor uses.
If you don't know something specific about the website, politely let the user know and suggest they contact support.`;

    // ====================================================
    //  NO NEED TO EDIT BELOW THIS LINE
    // ====================================================

    const fab       = document.getElementById('chat-fab');
    const win       = document.getElementById('chat-window');
    const closeBtn  = document.getElementById('chat-close');
    const messages  = document.getElementById('chat-messages');
    const input     = document.getElementById('chat-input');
    const sendBtn   = document.getElementById('chat-send');

    let isOpen    = false;
    let isLoading = false;
    const chatHistory = [];

    const ICON_OPEN  = `<svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z" fill="white"/></svg>`;
    const ICON_CLOSE = `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="white"/></svg>`;

    fab.addEventListener('click', () => {
      isOpen = !isOpen;
      win.classList.toggle('open', isOpen);
      fab.innerHTML = isOpen ? ICON_CLOSE : ICON_OPEN;
      if (isOpen) setTimeout(() => input.focus(), 300);
    });

    closeBtn.addEventListener('click', () => {
      isOpen = false;
      win.classList.remove('open');
      fab.innerHTML = ICON_OPEN;
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 90) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
      const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      if (role === 'bot') {
        div.innerHTML = `<div class="bot-avatar">🤖</div><div class="msg-bubble">${safe}</div>`;
      } else {
        div.innerHTML = `<div class="msg-bubble">${safe}</div>`;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.id = 'typing-indicator';
      div.innerHTML = `<div class="bot-avatar">🤖</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addMessage(text, 'user');
      chatHistory.push({ role: 'user', content: text });
      showTyping();

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': ANTHROPIC_API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-allow-browser': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: chatHistory
          })
        });

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error.message || 'API error');
        }

        const reply = data.content?.map(b => b.text || '').join('') || 'Sorry, I could not generate a response.';
        chatHistory.push({ role: 'assistant', content: reply });
        removeTyping();
        addMessage(reply, 'bot');

      } catch (err) {
        removeTyping();
        addMessage('Sorry, something went wrong. Please try again later.', 'bot');
        console.error('Chatbot error:', err);
      }

      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  </script>
  <!-- ===== END OF CHATBOT WIDGET ===== -->

</body>
</html>
